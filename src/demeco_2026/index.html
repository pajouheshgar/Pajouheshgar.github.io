<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demeco 2026 Presentation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px);
      pointer-events: none;
    }

    body.web-slide {
      background: transparent;
    }

    body.web-slide::before {
      display: none;
    }

    #slide-img,
    #slide-frame {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      display: block;
      position: relative;
      transition: opacity 0.2s ease;
    }

    #slide-img.fade,
    #slide-frame.fade { opacity: 0; }

    #slide-frame {
      width: 100vw;
      height: 100vh;
      border: 0;
    }

    #controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: block;
      z-index: 10;
    }

    #controls .btn {
      pointer-events: auto;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 10px 14px;
      font: 14px/1.2 sans-serif;
      cursor: pointer;
      user-select: none;
    }

    #btn-prev { left: 12px; }
    #btn-next { right: 12px; }

    #btn-focus {
      display: none;
      pointer-events: auto;
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 12px;
      font: 13px/1.2 sans-serif;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <img id="slide-img" alt="" />
  <iframe id="slide-frame" title="" style="display: none;"></iframe>
  <div id="controls" aria-hidden="true">
    <button id="btn-prev" class="btn" type="button">Prev</button>
    <button id="btn-next" class="btn" type="button">Next</button>
    <button id="btn-focus" type="button">Exit Web</button>
  </div>

  <script>
    const SLIDES = [
      { name: "title", src: "title.png", bg: "#000000" },
      { name: "pattern", src: "pattern.png", bg: "#000000" },
      { name: "comparison", src: "comparison.png", bg: "#000000" },
      { name: "perception-adaptation", src: "perception+adaptation.png", bg: "#ffffff" },
      // {url: "https://distill.pub/2020/growing-ca/"},
      // {url: "https://distill.pub/selforg/2021/textures/"},
      { name: "dynca", url: "https://dynca.github.io/" },
      { name: "meshnca-perception", src: "meshnca_perception_new.png", bg: "#000000" },
      { name: "meshnca", url: "https://meshnca.github.io/" },
      { name: "perception-adaptation-gray", src: "perception+adaptation.png", bg: "#d4d4d4" },
      { name: "noisenca", url: "https://noisenca.github.io/" },
      { name: "cells2pixels", url: "https://cells2pixels.github.io/#growing" },
      // { src: "npa_architecture.png", bg: "#000000" },
      { name: "selforg-npa", url: "https://selforg-npa.github.io/#growing" },
      

      
      
    ];

    let current = 0;
    const img = document.getElementById('slide-img');
    const frame = document.getElementById('slide-frame');
    const controls = document.getElementById('controls');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnFocus = document.getElementById('btn-focus');

    document.body.tabIndex = -1;

    const preloadBin = document.createElement("div");
    preloadBin.id = "preload-bin";
    preloadBin.style.display = "none";
    document.body.appendChild(preloadBin);

    SLIDES.forEach(slide => {
      if (!slide.url) return;
      const preload = document.createElement("iframe");
      preload.src = slide.url;
      preload.loading = "eager";
      preload.setAttribute("aria-hidden", "true");
      preloadBin.appendChild(preload);
    });

    function setIframeInteractive(enabled) {
      frame.style.pointerEvents = enabled ? "auto" : "none";
      btnFocus.textContent = enabled ? "Exit Web" : "Interact";
      if (!enabled) document.body.focus();
    }

    function slideIndexFromHash() {
      const name = decodeURIComponent(window.location.hash.slice(1));
      if (!name) return -1;
      return SLIDES.findIndex(slide => slide.name === name);
    }

    function updateHash(slide) {
      const nextHash = `#${encodeURIComponent(slide.name)}`;
      if (window.location.hash !== nextHash) {
        history.replaceState(null, "", nextHash);
      }
    }

    function show(index, options = {}) {
      const slide = SLIDES[index];
      if (!slide) return;

      current = index;
      if (options.updateHash !== false) updateHash(slide);

      img.classList.add('fade');
      frame.classList.add('fade');

      setTimeout(() => {
        if (slide.url) {
          document.body.classList.add("web-slide");
          img.style.display = "none";
          frame.style.display = "block";
          btnFocus.style.display = "block";
          setIframeInteractive(true);
          frame.src = slide.url;
          frame.onload = () => frame.classList.remove('fade');
          frame.onerror = () => frame.classList.remove('fade');
          return;
        }

        document.body.classList.remove("web-slide");
        document.body.style.background = slide.bg;
        frame.style.display = "none";
        btnFocus.style.display = "none";
        setIframeInteractive(false);
        img.style.display = "block";
        img.src = slide.src;
        img.onload = () => img.classList.remove('fade');
        img.onerror = () => img.classList.remove('fade');
      }, 180);
    }

    btnPrev.addEventListener("click", () => {
      if (current > 0) show(current - 1);
    });

    btnNext.addEventListener("click", () => {
      if (current < SLIDES.length - 1) show(current + 1);
    });

    btnFocus.addEventListener("click", () => {
      setIframeInteractive(frame.style.pointerEvents === "none");
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft'  && current > 0)                show(current - 1);
      if (e.key === 'ArrowRight' && current < SLIDES.length - 1) show(current + 1);
    });

    window.addEventListener("hashchange", () => {
      const hashIndex = slideIndexFromHash();
      if (hashIndex >= 0 && hashIndex !== current) show(hashIndex, { updateHash: false });
    });

    if (SLIDES.length) {
      const initialIndex = Math.max(0, slideIndexFromHash());
      document.body.style.background = SLIDES[initialIndex].bg || "#000000";
      show(initialIndex);
    }
  </script>
</body>
</html>
