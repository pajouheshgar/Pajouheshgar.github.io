highlights:
  - title: "Exploring the Landscape of Non-Equilibrium Memories with Neural Cellular Automata"
    venue: "Physical Review Letters"
    year: 2025
    status: published
    authors: "Ehsan Pajouheshgar, A. Bhardwaj, N. Selub, E. Lake"
    description: "We study binary 2D cellular automata that robustly store one-bit memories under noise, and use a modified Neural Cellular Automata framework to discover many new memory-preserving rules beyond Toom's rule."
    links:
      arxiv: "https://arxiv.org/pdf/2508.15726"
      demo: "https://memorynca.github.io/2D"

  - title: "Mesh Neural Cellular Automata"
    venue: "ACM TOG / SIGGRAPH"
    year: 2024
    status: published
    authors: "Ehsan Pajouheshgar, Yitao Xu, Alexander Mordvintsev, Eyvind Niklasson, Tuur Stuyck, Sabine Süsstrunk"
    description: "MeshNCA extends Neural Cellular Automata from regular grids to triangle meshes, enabling local self-organization and real-time dynamic texture synthesis directly on 3D surfaces without UV unwrapping or global communication."
    image: "/legacy/images/meshnca.png"
    video: "/legacy/images/meshnca.mp4"
    links:
      demo: "https://meshnca.github.io/"
      arxiv: "https://arxiv.org/abs/2311.02820"
      code: "https://github.com/IVRL/MeshNCA"

  - title: "NoiseNCA: Noisy Seed Improves Spatio-Temporal Continuity of Neural Cellular Automata"
    venue: "ALife"
    year: 2024
    status: published
    awards:
      - "Best Student Paper Award"
    authors: "Ehsan Pajouheshgar, Yitao Xu, Sabine Süsstrunk"
    description: "We analyze NCA texture models in the continuous space-time limit, show that standard training overfits discretization near the seed, and use uniform-noise initialization to learn dynamics that stay consistent across resolutions, are robust to stochastic updates and additive noise, and behave like PDEs."
    image: "/legacy/images/noisenca.png"
    video: "/legacy/images/noisenca.mp4"
    links:
      demo: "https://noisenca.github.io/"
      arxiv: "https://arxiv.org/abs/2404.06279"
      code: "https://github.com/IVRL/NoiseNCA"

  - title: "DyNCA: Real-time Dynamic Texture Synthesis Using Neural Cellular Automata"
    venue: "CVPR"
    year: 2023
    status: published
    authors: "Ehsan Pajouheshgar, Yitao Xu, Tuur Stuyck, Sabine Süsstrunk"
    description: "DyNCA enables real-time and controllable dynamic texture synthesis, producing arbitrarily long and arbitrary-size video textures while improving synthesis speed and quality by orders of magnitude over prior optimization-based methods."
    image: "/legacy/images/dynca.png"
    video: "/legacy/images/dynca.mp4"
    links:
      demo: "https://dynca.github.io/"
      arxiv: "https://arxiv.org/abs/2211.11417"
      code: "https://github.com/IVRL/DyNCA"

other:
  - title: "Neural Particle Automata: Learning Self-Organizing Particle Dynamics"
    venue: "SIGGRAPH"
    year: 2026
    status: under-submission
    authors: "H. Kim*, Ehsan Pajouheshgar*, S. Süsstrunk, W. Jakob, J. Park"
    description: "We introduce Neural Particle Automata, a Lagrangian generalization of NCA where cells are particles with continuous positions and internal states updated by a shared local neural rule, and combine differentiable SPH operators with efficient CUDA kernels to scale self-organizing particle dynamics across multiple tasks."
    links:
      demo: "https://selforg-npa.github.io"

  - title: "Neural Cellular Automata: From Cells to Pixels"
    venue: "SIGGRAPH"
    year: 2026
    status: under-submission
    authors: "Ehsan Pajouheshgar, Y. Xu, A. Abbasi, A. Mordvintsev, W. Jakob, S. Süsstrunk"
    description: "We pair a coarse-grid NCA with a lightweight local implicit decoder to render self-organizing outputs at arbitrary resolution in real time, overcoming high-resolution NCA memory and compute bottlenecks while preserving regeneration, robustness, and spontaneous dynamics across 2D, 3D, and mesh domains."
    links:
      demo: "https://cells2pixels.github.io"

  - title: "The Mokume Dataset and Inverse Modeling of Solid Wood Textures"
    venue: "ACM TOG / SIGGRAPH"
    year: 2025
    status: published
    authors: "M. Larsson, H. Yamaguchi, Ehsan Pajouheshgar, I-C. Shen, K. Tojo, C-M. Chang, et al."
    description: "We present Mokume, a solid-wood dataset of 190 cube samples with high-resolution photos, ring annotations, and CT scans, and introduce a three-stage inverse pipeline that reconstructs globally consistent 3D growth fields and volumetric color textures from exterior photographs using procedural and NCA-based synthesis."
    links:
      project: "https://mokumeproject.github.io/"

  - title: "Volumetric Temporal Texture Synthesis for Smoke Stylization using Neural Cellular Automata"
    venue: "BMVC"
    year: 2025
    status: published
    awards:
      - "Best Poster Award"
    authors: "D. Wang, Ehsan Pajouheshgar, Y. Xu, T. Zhang, S. Süsstrunk"
    description: "We present VNCA, an efficient volumetric style-transfer model that synthesizes multi-view-consistent stylization features for target smoke in real time while preserving temporally coherent transitions across frames."
    links:
      arxiv: "https://arxiv.org/pdf/2502.09631"

  - title: "Canonical Latent Representations in Conditional Diffusion Models"
    venue: "Preprint"
    year: 2025
    status: preprint
    authors: "Y. Xu, T. Zhang, Ehsan Pajouheshgar, S. Süsstrunk"
    description: "We identify Canonical Latent Representations in conditional diffusion models and use them in CaDistill to transfer core class semantics through compact representative latent samples, enabling strong robustness and generalization with only a small fraction of the original training data."
    links:
      arxiv: "https://arxiv.org/abs/2506.09955"

  - title: "CLIPasso: Semantically-Aware Object Sketching"
    venue: "ACM TOG / SIGGRAPH"
    year: 2022
    status: published
    awards:
      - "Best Paper Award"
    authors: "Yael Vinker, Ehsan Pajouheshgar, Jessica Y. Bo, Roman Christian Bachmann, Amit Haim Bermano, Daniel Cohen-Or, Amir Zamir, Ariel Shamir"
    description: "CLIPasso abstracts any object into a sketch by jointly optimizing the position and shape of Bézier strokes, using a CLIP-based perceptual loss to preserve semantic identity across arbitrary levels of abstraction."
    image: "/legacy/images/clipasso.png"
    links:
      project: "https://clipasso.github.io/clipasso/"
      demo: "https://replicate.com/yael-vinker/clipasso"
      arxiv: "https://arxiv.org/abs/2202.05822"
      code: "https://github.com/yael-vinker/CLIPasso"

  - title: "Emergent Dynamics in Neural Cellular Automata"
    venue: "ALife"
    year: 2024
    status: published
    authors: "Y. Xu, Ehsan Pajouheshgar, S. Süsstrunk"
    description: "We analyze the relationship between NCA architecture and emergent motion in the dynamics by varying cell-state dimensionality and MLP width, showing that their disparity and proportionality strongly correlate with motion strength and provide a practical design rule for dynamic NCAs."
    links:
      arxiv: "https://arxiv.org/abs/2404.06406"

  - title: "Optimizing Latent Space Directions For GAN-based Local Image Editing"
    venue: "ICASSP"
    year: 2022
    status: published
    authors: "Ehsan Pajouheshgar, Tong Zhang, Sabine Süsstrunk"
    description: "We propose LELSD, a method that learns semantically meaningful directions in GAN latent space for localized image editing, enabling precise attribute changes in specific spatial regions without affecting the rest of the image."
    image: "/legacy/images/lelsd.png"
    links:
      arxiv: "https://arxiv.org/abs/2111.12583"
      code: "https://github.com/IVRL/LELSD"

  - title: "ChOracle: A Unified Statistical Framework for Churn Prediction"
    venue: "IEEE TKDE"
    year: 2020
    status: published
    authors: "A. Khodadadi, A. Hosseini, Ehsan Pajouheshgar, F. Mansouri, H.R. Rabiee"
    description: "ChOracle models churn through user return-time prediction by combining temporal point processes, recurrent neural networks, and latent loyalty variables, and uses an efficient variational backpropagation-through-time training method that generalizes across diverse real-world datasets."
    links:
      paper: "https://ieeexplore.ieee.org/abstract/document/9109662"

  - title: "Back to Square One: Probabilistic Trajectory Forecasting Without Bells and Whistles"
    venue: "NeurIPS Workshop"
    year: 2018
    status: published
    authors: "Ehsan Pajouheshgar, Christoph H. Lampert"
    description: "We propose an auto-regressive spatio-temporal CNN that outputs explicit probability distributions over future trajectories from visual input, and show that this simple probabilistic baseline matches or outperforms more complex methods on MNISTseq and Stanford Drone benchmarks."
    image: "/legacy/images/ptf.png"
    links:
      arxiv: "https://arxiv.org/abs/1812.02984"
