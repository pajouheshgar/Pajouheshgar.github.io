- title: "Emergent Multi-Scale Behavior in Dynamical Systems"
  description: "Can we find a dynamical system with fixed microscopic rules which spontaneously exhibits qualitatively new behavior as simulation scale (particle count, grid size, time) increases? Physical reality shows emergence at each organizational level—atoms, molecules, cells, organisms, ecosystems—where new phenomena invisible at smaller scales appear."
  tags: ["artificial-life", "complex-systems", "particle-lenia"]
  status: "active"
